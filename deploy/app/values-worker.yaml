component: worker
replicas: 2

image:
  repository: ghcr.io/GiladTrachtenberg/video-demo
  tag: ""

imagePullSecrets:
  - name: ghcr-pull-secret

migrations:
  enabled: false

commandOverride:
  command: ["celery"]
  args: ["-A", "src.tasks", "worker", "--loglevel=info", "--concurrency=2"]

service:
  enabled: false

configMap:
  enabled: true
  data:
    APP_NAME: video-demo
    DEBUG: "false"
    MINIO_BUCKET: video-demo
    MINIO_SECURE: "false"

sharedSecrets:
  - app-shared-secrets
